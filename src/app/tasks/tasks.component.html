@if(isAddingTask) {
  <app-new-task (close)="onCancelAddTask()" [userId]="userId"/>
}

<section id="tasks">
  <header>
    <h2>{{name}}'s Tasks</h2>
    <menu>
      <button (click)="onStartAddTask()">Add task</button>
    </menu>
  </header>

  <ul>
    @for (task of selecetedUserTasks; track $index) {
      <li>
        <app-task [task]="task"/>
      </li>
    }
  </ul>
</section>
